  const origPanel = document.createElement('div');
  origPanel.className = 'panel panel-orig';
  origPanel.innerHTML = `<div class="panel-title">📄 原始公式图片</div>
    <img class="formula-img" src="data:image/png;base64,${f.b64}" alt="原始公式">`;
  if (notes[f.id]) {
    origPanel.innerHTML += `<div class="note">⚠️ ${notes[f.id]}</div>`;
  }

  // Correct formula panel
  const correctPanel = document.createElement('div');
  correctPanel.className = 'panel panel-correct';
  correctPanel.innerHTML = `<div class="panel-title">✅ 正确公式表达</div>
    <div class="latex-box" id="latex-${f.id}">\\(${f.correct}\\)</div>`;

  body.appendChild(origPanel);
  body.appendChild(correctPanel);
  card.appendChild(body);
  container.appendChild(card);
});

// Trigger MathJax render
if (window.MathJax) {
  MathJax.typesetPromise();
}
</script>
</body>
</html>
